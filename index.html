<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Finder</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <nav class="nav">
      <div class="nav--left">
        <img
          class="logo--image"
          src="https://img.icons8.com/?size=100&id=62856&format=png&color=000000"
          alt="GitHub Icon"
        />
        <h3 class="nav--text">GitHub Finder</h3>
      </div>

      <div class="nav--right">
        <a class="home navigator--right" href="#">Home</a>
        <a class="about navigator--right" href="#">About</a>
      </div>
    </nav>

    <section class="main">
      <div class="header--section">
        <div class="content--left">
          <div class="img--container">
            <img
              src="https://img.icons8.com/?size=100&id=62856&format=png&color=000000"
              alt="profile Photo"
              class="profile-photo"
            />
          </div>
        </div>
        <div class="content--right">
          <h2>GitHub <span class="content-span">organization</span></h2>
          <p class="bio">How People Build Softwares</p>

          <button class="gitHub-profile-btn gitHub--link">
            Vist GitHub Profile
          </button>

          <div class="more-info">
            <div class="info-left common">
              <p class="info">Location</p>
              <span class="sub-info">San fransico, CA </span>
            </div>
            <div class="info-right common">
              <p class="info">Link</p>
              <a href="#" class="link-info"> www.git-hud.com</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="stat">
      <div class="stat-container">
        <div class="stat-info">
          <p>Followers</p>
          <h3 class="followers">17302</h3>
        </div>
        <div class="stat-info">
          <p>Following</p>
          <h3>0</h3>
        </div>

        <div class="stat-info">
          <img
            class="stat-img"
            src="https://img.icons8.com/?size=100&id=diWpdut8ORDL&format=png&color=000000"
            alt=""
          />

          <div class="cover">
            <p>Public Repo</p>
            <h3 class="public-repo">432</h3>
          </div>
        </div>
        <div class="stat-info">
          <p>Public Gisr</p>
          <h3>0</h3>
        </div>
      </div>
    </section>
<!-- WILL CHECK LATER CLONING SUCCESSFUL -->

  </body>
</html>
